services:
  pgdb:
    image: postgres:16-alpine
    container_name: sadaf_pgdb
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Asia/Tashkent}
    ports:
      - "5434:5432"
    volumes:
      - sadaf_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      shared_network:
        aliases:
          - pgdb

  redis:
    image: redis:7-alpine
    container_name: sadaf_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - sadaf_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      shared_network:
        aliases:
          - redis

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sadaf
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      pgdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8100:8000"
    volumes:
      - ./:/app
      - sadaf_static:/app/static
      - sadaf_uploads:/app/uploads
    networks:
      - shared_network

volumes:
  sadaf_pgdata:
  sadaf_redis_data:
  sadaf_static:
  sadaf_uploads:

networks:
  shared_network:
    external: true
