[program:sadaf]
command=/home/user/sadaf-back/clinicSADAF/venv/bin/gunicorn clinicSADAF.asgi:application -k uvicorn.workers.UvicornWorker --bind 127.0.0.1:8002
directory=/home/user/sadaf-back/clinicSADAF
autostart=true
autorestart=true
redirect_stderr=true
stderr_logfile=/home/user/sadaf-back/clinicSADAF/logs/debug.log
stdout_logfile=/home/user/sadaf-back/clinicSADAF/logs/debug.log

[program:sadafcelery]
command=/home/user/sadaf-back/clinicSADAF/venv/bin/celery -A clinicSADAF.celery_app worker --loglevel=info
directory=/home/user/sadaf-back/clinicSADAF
autostart=true
autorestart=true
stderr_logfile=/home/user/sadaf-back/clinicSADAF/logs/celery.log
stdout_logfile=/home/user/sadaf-back/clinicSADAF/logs/celery_out.log
